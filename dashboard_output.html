function metric(label, value, colorClass) {
    return '<div class="metric"><span class="metric-label">'+label+'</span><span class="metric-value'+(colorClass?' '+colorClass:'')+'">'+value+'</span></div>';
}

        h += '<div class="value">'+(idx.value||'--').toLocaleString()+'</div>';
        h += '<div class="change '+cls+'">'+arrow+' '+(idx.change||0)+' ('+chg+'%)</div>';

    // Top Gainers

    for (var i=0; i<losers.length; i++) {

    for (var i=0;i<sectors.length;i++) { if(Math.abs(sectors[i].change_pct)>maxPct) maxPct=Math.abs(sectors[i].change_pct); }
    for (var i=0; i<sectors.length; i++) {
        var s = sectors[i];
        var w = Math.min(Math.abs(s.change_pct)/maxPct*100, 100);
        var cls = s.change_pct >= 0 ? 'up' : 'down';
        var sign = s.change_pct >= 0 ? '+' : '';
        h += '<div class="sector-bar"><span class="name">'+s.sector+'</span>';

    if (sectors.length===0) h += '<p style="color:#666">No data</p>';
    h += '</div>';

    // Market Breadth

    h += metric('Date', MARKET.date || '--');
    h += metric('Updated', MARKET.time || '--');
    h += '</div>';

    h += '</div>';

<script>
function renderStockTabs() {
    var tabsEl = document.getElementById('tabs');
    var panelsEl = document.getElementById('panels');

    RESULTS.forEach(function(result, idx) {
        var btn = document.createElement('button');
        btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
        btn.textContent = result.symbol;
        btn.setAttribute('data-idx', idx);
        btn.onclick = function() { switchTab(parseInt(this.getAttribute('data-idx'))); };
        tabsEl.appendChild(btn);

        var panel = document.createElement('div');
        panel.className = 'stock-panel' + (idx === 0 ? ' active' : '');
        panel.id = 'panel-' + idx;
        if (result.error) {
            panel.innerHTML = '<div class="error-panel"><h3>Error analyzing '+result.symbol+'</h3><p>'+result.error+'</p></div>';
        } else {
            panel.innerHTML = buildPanel(result);
        }
        panelsEl.appendChild(panel);
    });
}

function switchTab(idx) {
    var btns = document.querySelectorAll('.tab-btn');
    var panels = document.querySelectorAll('.stock-panel');
    for (var i=0; i<btns.length; i++) {
        btns[i].className = 'tab-btn' + (i===idx?' active':'');
        panels[i].className = 'stock-panel' + (i===idx?' active':'');
    }
}

function buildPanel(d) {
    var recClass = d.recommendation.indexOf('BUY')>=0?'buy':d.recommendation.indexOf('SELL')>=0?'sell':'hold';

    var sr = d.support_resistance;
    var ns = d.news_sentiment;

    var si = d.stock_info;
    var pred = d.predictions;
    var h = '';

    // Signal Box
    h += '<div class="signal-box">';

    h += '<div class="recommendation '+recClass+'">'+d.recommendation+'</div>';
    h += '<div class="trend">Trend: '+d.trend_analysis+' | '+(si.sector||'')+'</div>';
    h += '<div class="risk '+riskClass+'">Risk: '+d.risk_level+'</div>';
    h += '</div>';

    // Row 1: Trading + Predictions
    h += '<div class="grid-2">';
    h += '<div class="card"><h3>Trading Levels</h3>';
    h += metric('Entry Price','&#8377;'+d.entry_price);
    h += metric('Stop Loss','&#8377;'+d.stop_loss,'negative');
    h += metric('Target Price','&#8377;'+d.target_price,'positive');
    h += metric('ATR','&#8377;'+ti.atr);
    var sl = Math.abs(d.entry_price - d.stop_loss);
    var rr = sl>0?((Math.abs(d.target_price-d.entry_price))/sl).toFixed(1):'N/A';
    h += metric('Risk:Reward','1:'+rr);
    h += '</div>';

    h += '<div class="card"><h3>ML Predictions</h3>';
    var hzns = [['1_day','1 Day'],['1_week','1 Week'],['1_month','1 Month']];
    for (var i=0;i<hzns.length;i++) {
        var p = pred[hzns[i][0]];
        var prob = (p.probability_up*100).toFixed(1);
        var isUp = p.probability_up > 0.5;
        h += '<div class="pred-row"><div class="pred-header">';
        h += '<span class="pred-label">'+hzns[i][1]+'</span>';
        h += '<span class="pred-value '+(isUp?'positive':'negative')+'">'+p.direction+' ('+prob+'%)</span>';
        h += '</div><div class="pred-bar"><div class="pred-fill '+(isUp?'up':'down')+'" style="width:'+prob+'%"></div></div></div>';
    }
    h += '</div></div>';

    // Row 2: Indicators + S/R + News
    h += '<div class="grid-3">';

    h += '<div class="card"><h3>Technical Indicators</h3>';
    var rsiC = ti.rsi>70?'negative':ti.rsi<30?'positive':'';
    h += metric('RSI (14)', ti.rsi+' ('+ti.rsi_signal+')', rsiC);
    var macdC = ti.macd_signal.indexOf('Bullish')>=0?'positive':ti.macd_signal.indexOf('Bearish')>=0?'negative':'';
    h += metric('MACD', ti.macd_signal, macdC);
    var maC = ti.ma_signal.indexOf('Bullish')>=0?'positive':ti.ma_signal.indexOf('Bearish')>=0?'negative':'neutral';
    h += metric('Moving Avg', ti.ma_signal, maC);
    h += metric('ADX', ti.adx+' ('+ti.trend_strength+')');
    h += metric('Bollinger', ti.bb_signal);
    h += metric('Volume', ti.volume_ratio+'x', ti.volume_ratio>1.5?'positive':'');
    h += metric('EMA 20','&#8377;'+ti.ema_20);
    h += metric('SMA 50','&#8377;'+ti.sma_50);
    h += metric('SMA 200','&#8377;'+ti.sma_200);
    h += '</div>';

    h += '<div class="card"><h3>Support & Resistance</h3>';
    h += metric('Resistance 2','&#8377;'+sr.resistance_2,'positive');
    h += metric('Resistance 1','&#8377;'+sr.resistance_1,'positive');
    h += metric('Pivot','&#8377;'+sr.pivot);
    h += metric('Support 1','&#8377;'+sr.support_1,'negative');
    h += metric('Support 2','&#8377;'+sr.support_2,'negative');
    h += metric('52W High','&#8377;'+sr['52_week_high'],'positive');
    h += metric('52W Low','&#8377;'+sr['52_week_low'],'negative');
    h += '</div>';

    h += '<div class="card"><h3>News & Sentiment</h3>';
    var sentC = ns.overall_sentiment==='Positive'?'positive':ns.overall_sentiment==='Negative'?'negative':'neutral';
    h += metric('Sentiment', ns.overall_sentiment, sentC);
    h += metric('Score', ns.sentiment_score.toFixed(4));
    h += metric('Positive', ns.positive_news, 'positive');
    h += metric('Negative', ns.negative_news, 'negative');
    h += metric('NIFTY Trend', mc.nifty_trend, mc.nifty_trend==='Bullish'?'positive':mc.nifty_trend==='Bearish'?'negative':'neutral');
    h += metric('Market Mood', mc.market_mood, mc.market_mood==='Bullish'?'positive':mc.market_mood==='Bearish'?'negative':'neutral');
    h += '</div>';
    h += '</div>';

    // Row 3: Info + Headlines
    h += '<div class="grid-2">';
    h += '<div class="card"><h3>Stock Info</h3>';
    h += metric('Sector', si.sector||'N/A');
    h += metric('Market Cap', si.market_cap?'&#8377;'+(si.market_cap/10000000).toFixed(0)+' Cr':'N/A');
    h += metric('P/E Ratio', si.pe_ratio?si.pe_ratio.toFixed(2):'N/A');
    h += metric('52W High', si['52_week_high']?'&#8377;'+si['52_week_high']:'N/A');
    h += metric('52W Low', si['52_week_low']?'&#8377;'+si['52_week_low']:'N/A');
    h += '</div>';

    h += '<div class="card"><h3>Headlines</h3>';
    if (ns.top_headlines && ns.top_headlines.length>0) {
        for (var i=0;i<ns.top_headlines.length;i++) h += '<div class="headline">'+ns.top_headlines[i]+'</div>';
    } else { h += '<p style="color:#666">No headlines available.</p>'; }
    h += '</div></div>';

    // Reasoning
    h += '<div class="card"><h3>Analysis Reasoning</h3><p class="reasoning">'+d.reasoning+'</p></div>';

    return h;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
