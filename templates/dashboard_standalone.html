<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecloud-Trade | Live Market Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#080818;color:#e0e0e0;min-height:100vh}
.container{max-width:1440px;margin:0 auto;padding:20px}
.header{text-align:center;padding:25px 0 15px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:20px}
.header h1{font-size:2.5rem;background:linear-gradient(90deg,#00d2ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .subtitle{color:#888;margin-top:5px;font-size:1rem}
.header .timestamp{color:#555;font-size:0.8rem;margin-top:3px}
.section-title{font-size:1.4rem;color:#fff;margin:25px 0 15px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.08)}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Ecloud-Trade</h1>
<p class="subtitle">Indian Share Market Analysis &amp; Prediction System</p>
<p class="timestamp">Live Data as of: {{TIMESTAMP}}</p>
</div>

<!-- Market Overview Section -->
<div id="market-overview"></div>

<!-- Stock Analysis Section -->
<h2 class="section-title" id="analysis-title">Stock Analysis</h2>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<div class="footer">
<p>Ecloud-Trade | For educational purposes only. Not financial advice.</p>
<p>Data: Yahoo Finance (Live) | Sentiment: Google News | ML: XGBoost + Random Forest</p>
</div>
</div>
<style>
/* Market Overview */
.market-banner{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.index-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;text-align:center}
.index-card .name{color:#999;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px}
.index-card .value{font-size:1.5rem;font-weight:700;color:#fff;margin:6px 0}
.index-card .change{font-size:0.9rem;font-weight:600}
.index-card .change.up{color:#00e676}
.index-card .change.down{color:#ff5252}
.index-card .change.flat{color:#ffd740}

.market-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:25px}
.market-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px}
.market-card h3{color:#00d2ff;margin-bottom:12px;font-size:1rem}
.stock-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.stock-row:last-child{border-bottom:none}
.stock-row .symbol{font-weight:600;color:#fff;font-size:0.9rem}
.stock-row .price{color:#aaa;font-size:0.85rem}
.stock-row .change-badge{padding:3px 8px;border-radius:4px;font-size:0.8rem;font-weight:600}
.stock-row .change-badge.up{background:rgba(0,230,118,0.15);color:#00e676}
.stock-row .change-badge.down{background:rgba(255,82,82,0.15);color:#ff5252}

.sector-bar{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.sector-bar:last-child{border-bottom:none}
.sector-bar .name{width:60px;font-size:0.85rem;color:#ccc}
.sector-bar .bar-wrap{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.sector-bar .bar-fill{height:100%;border-radius:3px}
.sector-bar .bar-fill.up{background:linear-gradient(90deg,#00e676,#69f0ae)}
.sector-bar .bar-fill.down{background:linear-gradient(90deg,#ff5252,#ff8a80)}
.sector-bar .pct{width:55px;text-align:right;font-size:0.8rem;font-weight:600}

.market-status-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:0.85rem;font-weight:600;margin-left:10px}
.market-status-badge.Bullish{background:rgba(0,230,118,0.15);color:#00e676}
.market-status-badge.Bearish{background:rgba(255,82,82,0.15);color:#ff5252}
.market-status-badge.Flat{background:rgba(255,215,64,0.15);color:#ffd740}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:10px 22px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#aaa;cursor:pointer;font-size:0.9rem;transition:all 0.2s}
.tab-btn:hover{background:rgba(0,210,255,0.1);color:#fff}
.tab-btn.active{background:linear-gradient(135deg,#00d2ff22,#7b2ff722);border-color:#00d2ff;color:#00d2ff;font-weight:600}
.stock-panel{display:none}.stock-panel.active{display:block}

/* Cards */
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:22px;margin-bottom:18px}
.card h3{color:#00d2ff;margin-bottom:14px;font-size:1.05rem}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}

/* Signal */
.signal-box{text-align:center;padding:28px;background:linear-gradient(135deg,rgba(0,210,255,0.03),rgba(123,47,247,0.03));border:1px solid rgba(0,210,255,0.15);border-radius:16px;margin-bottom:18px}
.signal-box .stock-name{font-size:1.7rem;font-weight:700;color:#fff}
.signal-box .price{font-size:1.2rem;color:#aaa;margin:6px 0}
.signal-box .recommendation{font-size:2.6rem;font-weight:800;margin:10px 0}
.signal-box .recommendation.buy{color:#00e676}
.signal-box .recommendation.sell{color:#ff5252}
.signal-box .recommendation.hold{color:#ffd740}
.signal-box .trend{font-size:1rem;color:#bbb}
.signal-box .risk{margin-top:6px;font-size:0.85rem}
.risk-low{color:#00e676}.risk-medium{color:#ffd740}.risk-high{color:#ff5252}

/* Metrics */
.metric{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.metric:last-child{border-bottom:none}
.metric-label{color:#999;font-size:0.85rem}
.metric-value{font-weight:600;font-size:0.9rem}
.positive{color:#00e676}.negative{color:#ff5252}.neutral{color:#ffd740}

/* Predictions */
.pred-row{margin-bottom:10px}
.pred-header{display:flex;justify-content:space-between;margin-bottom:3px}
.pred-label{color:#999;font-size:0.82rem}
.pred-value{font-weight:600;font-size:0.82rem}
.pred-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.pred-fill{height:100%;border-radius:3px}.pred-fill.up{background:linear-gradient(90deg,#00e676,#69f0ae)}.pred-fill.down{background:linear-gradient(90deg,#ff5252,#ff8a80)}

.headline{font-size:0.82rem;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);color:#bbb}
.reasoning{line-height:1.7;color:#ccc;font-size:0.9rem}
.error-panel{text-align:center;padding:40px;color:#ff8a80}
.footer{text-align:center;padding:25px 0;color:#444;font-size:0.78rem;border-top:1px solid rgba(255,255,255,0.04);margin-top:30px}
</style>
<script>
var RESULTS = {{RESULTS_DATA}};
var MARKET = {{MARKET_DATA}};

function metric(label, value, colorClass) {
    return '<div class="metric"><span class="metric-label">'+label+'</span><span class="metric-value'+(colorClass?' '+colorClass:'')+'">'+value+'</span></div>';
}

function init() {
    renderMarketOverview();
    renderStockTabs();
}

function renderMarketOverview() {
    var el = document.getElementById('market-overview');
    var h = '';

    h += '<h2 class="section-title">Daily Market Update <span class="market-status-badge '+MARKET.market_status+'">'+MARKET.market_status+'</span></h2>';

    // Index cards
    h += '<div class="market-banner">';
    var indexNames = {'NIFTY_50':'NIFTY 50','SENSEX':'SENSEX','NIFTY_BANK':'BANK NIFTY','NIFTY_IT':'NIFTY IT'};
    for (var key in indexNames) {
        var idx = MARKET.indices[key] || {};
        var chg = idx.change_pct || 0;
        var cls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
        var arrow = chg > 0 ? '&#9650;' : chg < 0 ? '&#9660;' : '&#9644;';
        h += '<div class="index-card">';
        h += '<div class="name">'+indexNames[key]+'</div>';
        h += '<div class="value">'+(idx.value||'--').toLocaleString()+'</div>';
        h += '<div class="change '+cls+'">'+arrow+' '+(idx.change||0)+' ('+chg+'%)</div>';
        h += '</div>';
    }
    h += '</div>';

    // Gainers, Losers, Sectors
    h += '<div class="market-grid">';

    // Top Gainers
    h += '<div class="market-card"><h3>Top Gainers</h3>';
    var gl = MARKET.gainers_losers || {};
    var gainers = gl.top_gainers || [];
    for (var i=0; i<gainers.length; i++) {
        var g = gainers[i];
        h += '<div class="stock-row"><span class="symbol">'+g.symbol+'</span><span class="price">&#8377;'+g.price+'</span><span class="change-badge up">+'+g.change_pct+'%</span></div>';
    }
    if (gainers.length===0) h += '<p style="color:#666">No data</p>';
    h += '</div>';

    // Top Losers
    h += '<div class="market-card"><h3>Top Losers</h3>';
    var losers = gl.top_losers || [];
    for (var i=0; i<losers.length; i++) {
        var l = losers[i];
        h += '<div class="stock-row"><span class="symbol">'+l.symbol+'</span><span class="price">&#8377;'+l.price+'</span><span class="change-badge down">'+l.change_pct+'%</span></div>';
    }
    if (losers.length===0) h += '<p style="color:#666">No data</p>';
    h += '</div>';

    // Sector Performance
    h += '<div class="market-card"><h3>Sector Performance</h3>';
    var sectors = MARKET.sector_performance || [];
    var maxPct = 1;
    for (var i=0;i<sectors.length;i++) { if(Math.abs(sectors[i].change_pct)>maxPct) maxPct=Math.abs(sectors[i].change_pct); }
    for (var i=0; i<sectors.length; i++) {
        var s = sectors[i];
        var w = Math.min(Math.abs(s.change_pct)/maxPct*100, 100);
        var cls = s.change_pct >= 0 ? 'up' : 'down';
        var sign = s.change_pct >= 0 ? '+' : '';
        h += '<div class="sector-bar"><span class="name">'+s.sector+'</span>';
        h += '<div class="bar-wrap"><div class="bar-fill '+cls+'" style="width:'+w+'%"></div></div>';
        h += '<span class="pct '+( s.change_pct>=0?'positive':'negative')+'">'+sign+s.change_pct+'%</span></div>';
    }
    if (sectors.length===0) h += '<p style="color:#666">No data</p>';
    h += '</div>';

    // Market Breadth
    h += '<div class="market-card"><h3>Market Breadth</h3>';
    var adv = gl.total_advancing || 0;
    var dec = gl.total_declining || 0;
    var unc = gl.total_unchanged || 0;
    h += metric('Advancing', adv, 'positive');
    h += metric('Declining', dec, 'negative');
    h += metric('Unchanged', unc, '');
    h += metric('Advance/Decline', dec>0?(adv/dec).toFixed(2):'N/A', adv>dec?'positive':'negative');
    h += metric('Date', MARKET.date || '--');
    h += metric('Updated', MARKET.time || '--');
    h += '</div>';

    h += '</div>';
    el.innerHTML = h;
}
</script>
<script>
function renderStockTabs() {
    var tabsEl = document.getElementById('tabs');
    var panelsEl = document.getElementById('panels');

    RESULTS.forEach(function(result, idx) {
        var btn = document.createElement('button');
        btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
        btn.textContent = result.symbol;
        btn.setAttribute('data-idx', idx);
        btn.onclick = function() { switchTab(parseInt(this.getAttribute('data-idx'))); };
        tabsEl.appendChild(btn);

        var panel = document.createElement('div');
        panel.className = 'stock-panel' + (idx === 0 ? ' active' : '');
        panel.id = 'panel-' + idx;
        if (result.error) {
            panel.innerHTML = '<div class="error-panel"><h3>Error analyzing '+result.symbol+'</h3><p>'+result.error+'</p></div>';
        } else {
            panel.innerHTML = buildPanel(result);
        }
        panelsEl.appendChild(panel);
    });
}

function switchTab(idx) {
    var btns = document.querySelectorAll('.tab-btn');
    var panels = document.querySelectorAll('.stock-panel');
    for (var i=0; i<btns.length; i++) {
        btns[i].className = 'tab-btn' + (i===idx?' active':'');
        panels[i].className = 'stock-panel' + (i===idx?' active':'');
    }
}

function buildPanel(d) {
    var recClass = d.recommendation.indexOf('BUY')>=0?'buy':d.recommendation.indexOf('SELL')>=0?'sell':'hold';
    var riskClass = 'risk-'+d.risk_level.toLowerCase();
    var ti = d.technical_indicators;
    var sr = d.support_resistance;
    var ns = d.news_sentiment;
    var mc = d.market_context;
    var si = d.stock_info;
    var pred = d.predictions;
    var h = '';

    // Signal Box
    h += '<div class="signal-box">';
    h += '<div class="stock-name">'+d.symbol+'</div>';
    h += '<div class="price">&#8377;'+d.current_price+'</div>';
    h += '<div class="recommendation '+recClass+'">'+d.recommendation+'</div>';
    h += '<div class="trend">Trend: '+d.trend_analysis+' | '+(si.sector||'')+'</div>';
    h += '<div class="risk '+riskClass+'">Risk: '+d.risk_level+'</div>';
    h += '</div>';

    // Row 1: Trading + Predictions
    h += '<div class="grid-2">';
    h += '<div class="card"><h3>Trading Levels</h3>';
    h += metric('Entry Price','&#8377;'+d.entry_price);
    h += metric('Stop Loss','&#8377;'+d.stop_loss,'negative');
    h += metric('Target Price','&#8377;'+d.target_price,'positive');
    h += metric('ATR','&#8377;'+ti.atr);
    var sl = Math.abs(d.entry_price - d.stop_loss);
    var rr = sl>0?((Math.abs(d.target_price-d.entry_price))/sl).toFixed(1):'N/A';
    h += metric('Risk:Reward','1:'+rr);
    h += '</div>';

    h += '<div class="card"><h3>ML Predictions</h3>';
    var hzns = [['1_day','1 Day'],['1_week','1 Week'],['1_month','1 Month']];
    for (var i=0;i<hzns.length;i++) {
        var p = pred[hzns[i][0]];
        var prob = (p.probability_up*100).toFixed(1);
        var isUp = p.probability_up > 0.5;
        h += '<div class="pred-row"><div class="pred-header">';
        h += '<span class="pred-label">'+hzns[i][1]+'</span>';
        h += '<span class="pred-value '+(isUp?'positive':'negative')+'">'+p.direction+' ('+prob+'%)</span>';
        h += '</div><div class="pred-bar"><div class="pred-fill '+(isUp?'up':'down')+'" style="width:'+prob+'%"></div></div></div>';
    }
    h += '</div></div>';

    // Row 2: Indicators + S/R + News
    h += '<div class="grid-3">';

    h += '<div class="card"><h3>Technical Indicators</h3>';
    var rsiC = ti.rsi>70?'negative':ti.rsi<30?'positive':'';
    h += metric('RSI (14)', ti.rsi+' ('+ti.rsi_signal+')', rsiC);
    var macdC = ti.macd_signal.indexOf('Bullish')>=0?'positive':ti.macd_signal.indexOf('Bearish')>=0?'negative':'';
    h += metric('MACD', ti.macd_signal, macdC);
    var maC = ti.ma_signal.indexOf('Bullish')>=0?'positive':ti.ma_signal.indexOf('Bearish')>=0?'negative':'neutral';
    h += metric('Moving Avg', ti.ma_signal, maC);
    h += metric('ADX', ti.adx+' ('+ti.trend_strength+')');
    h += metric('Bollinger', ti.bb_signal);
    h += metric('Volume', ti.volume_ratio+'x', ti.volume_ratio>1.5?'positive':'');
    h += metric('EMA 20','&#8377;'+ti.ema_20);
    h += metric('SMA 50','&#8377;'+ti.sma_50);
    h += metric('SMA 200','&#8377;'+ti.sma_200);
    h += '</div>';

    h += '<div class="card"><h3>Support & Resistance</h3>';
    h += metric('Resistance 2','&#8377;'+sr.resistance_2,'positive');
    h += metric('Resistance 1','&#8377;'+sr.resistance_1,'positive');
    h += metric('Pivot','&#8377;'+sr.pivot);
    h += metric('Support 1','&#8377;'+sr.support_1,'negative');
    h += metric('Support 2','&#8377;'+sr.support_2,'negative');
    h += metric('52W High','&#8377;'+sr['52_week_high'],'positive');
    h += metric('52W Low','&#8377;'+sr['52_week_low'],'negative');
    h += '</div>';

    h += '<div class="card"><h3>News & Sentiment</h3>';
    var sentC = ns.overall_sentiment==='Positive'?'positive':ns.overall_sentiment==='Negative'?'negative':'neutral';
    h += metric('Sentiment', ns.overall_sentiment, sentC);
    h += metric('Score', ns.sentiment_score.toFixed(4));
    h += metric('Positive', ns.positive_news, 'positive');
    h += metric('Negative', ns.negative_news, 'negative');
    h += metric('NIFTY Trend', mc.nifty_trend, mc.nifty_trend==='Bullish'?'positive':mc.nifty_trend==='Bearish'?'negative':'neutral');
    h += metric('Market Mood', mc.market_mood, mc.market_mood==='Bullish'?'positive':mc.market_mood==='Bearish'?'negative':'neutral');
    h += '</div>';
    h += '</div>';

    // Row 3: Info + Headlines
    h += '<div class="grid-2">';
    h += '<div class="card"><h3>Stock Info</h3>';
    h += metric('Sector', si.sector||'N/A');
    h += metric('Market Cap', si.market_cap?'&#8377;'+(si.market_cap/10000000).toFixed(0)+' Cr':'N/A');
    h += metric('P/E Ratio', si.pe_ratio?si.pe_ratio.toFixed(2):'N/A');
    h += metric('52W High', si['52_week_high']?'&#8377;'+si['52_week_high']:'N/A');
    h += metric('52W Low', si['52_week_low']?'&#8377;'+si['52_week_low']:'N/A');
    h += '</div>';

    h += '<div class="card"><h3>Headlines</h3>';
    if (ns.top_headlines && ns.top_headlines.length>0) {
        for (var i=0;i<ns.top_headlines.length;i++) h += '<div class="headline">'+ns.top_headlines[i]+'</div>';
    } else { h += '<p style="color:#666">No headlines available.</p>'; }
    h += '</div></div>';

    // Reasoning
    h += '<div class="card"><h3>Analysis Reasoning</h3><p class="reasoning">'+d.reasoning+'</p></div>';

    return h;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
